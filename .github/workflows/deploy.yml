# Деплой на сервер. Запуск от root (runner/SSH).
# Старые файлы удаляются (rsync --delete), кроме кеша картинок .next/cache.
# После выкладки: pnpm install --prod и chown -R www-data:www-data.
#
# Секреты репозитория: SSH_HOST, SSH_USER, SSH_PRIVATE_KEY, DEPLOY_PATH (путь на хосте).
# CMS: EMDASH_URL, EMDASH_API_TOKEN, REVALIDATION_SECRET.
# Notifications: TG_BOT_TOKEN, TG_CHAT_ID.

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install and build
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Deploy via rsync (remove old files, keep .next/cache)
        uses: burnett01/rsync-deployments@v8
        with:
          switches: -avzr --delete --filter 'protect .env'
          path: ./
          remote_path: ${{ env.DEPLOY_PATH }}/
          remote_host: ${{ secrets.SSH_HOST }}
          remote_user: ${{ secrets.SSH_USER }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}
          exclude: |
            .next/cache
            .git
            .github
            node_modules
            .env
            .env.*
            !.env.example

      - name: Install production deps and chown www-data
        uses: appleboy/ssh-action@v1.0.3
        env:
          EMDASH_URL: ${{ secrets.EMDASH_URL }}
          EMDASH_API_TOKEN: ${{ secrets.EMDASH_API_TOKEN }}
          REVALIDATION_SECRET: ${{ secrets.REVALIDATION_SECRET }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: EMDASH_URL,EMDASH_API_TOKEN,REVALIDATION_SECRET,TG_BOT_TOKEN,TG_CHAT_ID
          script: |
            cd ${{ env.DEPLOY_PATH }}
            # Upsert env vars in .env (create file if missing)
            touch .env
            for VAR in EMDASH_URL EMDASH_API_TOKEN REVALIDATION_SECRET TG_BOT_TOKEN TG_CHAT_ID; do
              VALUE=$(printenv "$VAR")
              if [ -z "$VALUE" ]; then continue; fi
              if grep -q "^${VAR}=" .env; then
                sed -i "s|^${VAR}=.*|${VAR}=${VALUE}|" .env
              else
                echo "${VAR}=${VALUE}" >> .env
              fi
            done
            corepack enable
            pnpm install --prod
            chown -R www-data:www-data .
            pm2 startOrReload ecosystem.config.cjs --update-env
